server:
  port: ${SERVER_PORT}

spring:
  application:
    name: account-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        # ── Hibernate Envers ───────────────────────────────────────────────
        # Envers stores a revision for every @Audited entity change.
        # audit_table_suffix: the shadow tables will be named <entity>_aud
        # store_data_at_delete: also snapshot the row contents when DELETEd
        envers:
          audit_table_suffix: _aud
          revision_field_name: rev
          revision_type_field_name: revtype
          store_data_at_delete: true
          default_schema:


eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}
  instance:
    instance-id: ${spring.application.name}:${random.uuid}
    prefer-ip-address: true

feign:
  circuitbreaker:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: true
  metrics:
    tags:
      service: ${spring.application.name}
security:
  jwt:
    secret: ${JWT_SECRET}
    issuer: ${JWT_ISSUER}
services:
  user:
    url: ${USER_SERVICE_URL}
